<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Approvel — RMS Content Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d0d0b;--bg1:#141412;--bg2:#1c1c19;--bg3:#242421;--bg4:#2e2e2a;
  --line:#2e2e2a;--line2:#3d3d38;
  --t0:#f0ede8;--t1:#c4c0b8;--t2:#7a7770;--t3:#4a4845;
  --acc:#e8d5a3;--acc2:#c4a96b;
  --red:#e05555;--grn:#4caf72;--amb:#d4882a;--blu:#4a8fd4;
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sidebar:234px;--drawer:430px;
  --font:'Epilogue',sans-serif;--font-d:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:var(--font);color:var(--t0);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
button,input,select,textarea{font-family:inherit;font-size:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg1);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sb-head{padding:18px 14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.sb-mark{width:30px;height:30px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-mark svg{fill:var(--bg0)}
.sb-wm{font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--t0)}
.sb-body{flex:1;overflow-y:auto;padding:8px}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:var(--t3);padding:10px 8px 5px;display:flex;align-items:center;justify-content:space-between}
.sb-lbl-btn{width:17px;height:17px;border-radius:4px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.sb-lbl-btn:hover{background:var(--bg3);color:var(--t1)}
.nav{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r8);cursor:pointer;font-size:12.5px;color:var(--t2);transition:.12s;user-select:none;margin-bottom:1px}
.nav:hover{background:var(--bg3);color:var(--t1)}
.nav.on{background:var(--bg3);color:var(--t0);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:10px}
.sb-foot{flex-shrink:0;padding:8px;border-top:1px solid var(--line)}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r8);cursor:pointer;transition:.12s}
.sb-user:hover{background:var(--bg3)}
.av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;font-family:var(--font-d)}
.sb-uname{font-size:12px;font-weight:500;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:10px;color:var(--t3);text-transform:capitalize}
.sb-out{width:100%;text-align:left;padding:5px 8px;border:none;background:transparent;color:var(--t3);font-size:11px;cursor:pointer;border-radius:var(--r6);transition:.12s}
.sb-out:hover{background:var(--bg3);color:var(--t1)}
#topbar{flex-shrink:0;height:54px;background:var(--bg1);border-bottom:1px solid var(--line);padding:0 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.tb-title{font-family:var(--font-d);font-size:15px;font-weight:600;color:var(--t0);display:flex;align-items:center;gap:8px}
.tb-sub{font-size:11px;color:var(--t3);margin-top:1px}
.tb-r{display:flex;align-items:center;gap:7px}
.tabs{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r8);padding:3px;gap:2px}
.tab{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--t3);font-family:var(--font);transition:.12s}
.tab.on{background:var(--bg4);color:var(--t0)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r8);font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:var(--font);transition:.12s;white-space:nowrap;line-height:1}
.btn-gold{background:var(--acc);color:var(--bg0);border-color:var(--acc)}
.btn-gold:hover{background:var(--acc2);border-color:var(--acc2)}
.btn-outline{background:transparent;color:var(--t1);border-color:var(--line2)}
.btn-outline:hover{background:var(--bg3);border-color:var(--t3)}
.btn-ghost{background:transparent;color:var(--t2);border-color:transparent}
.btn-ghost:hover{background:var(--bg3);color:var(--t1)}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(224,85,85,.3)}
.btn-danger:hover{background:rgba(224,85,85,.1)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-icon{padding:5px;width:28px;height:28px;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}
#content{flex:1;overflow-y:auto;padding:22px}
.inp{width:100%;padding:8px 11px;border:1px solid var(--line2);border-radius:var(--r8);background:var(--bg2);color:var(--t0);font-family:var(--font);font-size:13px;outline:none;transition:.12s}
.inp:focus{border-color:var(--acc2);background:var(--bg3)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:72px}
/* overview */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r12);padding:18px 16px}
.stat-lbl{font-size:10px;color:var(--t3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-family:var(--font-d);font-size:34px;font-weight:700;color:var(--t0);line-height:1}
.stat-card.ca .stat-val{color:var(--amb)}.stat-card.cg .stat-val{color:var(--grn)}.stat-card.cr .stat-val{color:var(--red)}
.sec-ttl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.proj-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r12);padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.proj-card:hover{border-color:var(--line2);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.proj-top{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.proj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.proj-name{font-family:var(--font-d);font-size:13px;font-weight:600;color:var(--t0)}
.proj-client{font-size:11px;color:var(--t3);margin-top:1px}
.proj-arr{margin-left:auto;color:var(--t3)}
.proj-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.pst{background:var(--bg3);border-radius:5px;padding:6px 3px;text-align:center}
.pst-n{font-family:var(--font-d);font-size:14px;font-weight:700}
.pst-l{font-size:9px;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
/* feed */
.feed-wrap{max-width:860px}
.feed-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:10px}
.feed-counts{display:flex;gap:18px}
.fc{text-align:center}
.fc-n{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--t0)}
.fc-l{font-size:9px;color:var(--t3);margin-top:1px}
.feed-leg{display:flex;gap:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stories-lbl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.stories-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.story-bub{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.story-ring{width:54px;height:54px;border-radius:50%;padding:2px;display:flex;align-items:center;justify-content:center}
.story-ring.st-approved{background:conic-gradient(var(--grn),#2d8a50,var(--grn))}
.story-ring.st-rejected{background:conic-gradient(var(--t3),#3a3835,var(--t3))}
.story-ring.st-changes{background:conic-gradient(var(--amb),#a06820,var(--amb))}
.story-ring.st-pending{background:conic-gradient(var(--red),#a03030,var(--red))}
.story-ring.st-new{background:conic-gradient(var(--blu),#2a6090,var(--blu))}
.story-inn{width:48px;height:48px;border-radius:50%;background:var(--bg3);border:2px solid var(--bg1);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px}
.story-inn img{width:100%;height:100%;object-fit:cover}
.story-lbl{font-size:9px;color:var(--t2);max-width:54px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* IG grid — tight 3col exactly like Instagram */
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.ig-cell{aspect-ratio:1;position:relative;cursor:pointer;overflow:hidden;background:var(--bg3)}
.ig-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.ig-cell:hover img{transform:scale(1.04)}
.ig-cell canvas{position:absolute;inset:0;width:100%;height:100%}
.ig-cell-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.ig-cell-ph-ico{font-size:24px;line-height:1}
.ig-cell-ph-txt{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.ig-sdot{position:absolute;top:7px;left:7px;z-index:2;width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(0,0,0,.5);box-shadow:0 1px 3px rgba(0,0,0,.6)}
.ig-type-ico{position:absolute;top:6px;right:6px;z-index:2;color:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))}
.ig-hover{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:12px;transition:.18s;z-index:3}
.ig-cell:hover .ig-hover{background:rgba(0,0,0,.45)}
.ig-hstat{display:flex;align-items:center;gap:3px;color:#fff;font-size:11px;font-weight:600;opacity:0;transition:.18s}
.ig-cell:hover .ig-hstat{opacity:1}
.ig-btm{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.72));padding:18px 7px 7px;z-index:2;opacity:0;transition:.18s}
.ig-cell:hover .ig-btm{opacity:1}
.ig-btm-d{font-size:9px;color:rgba(255,255,255,.65)}
.ig-btm-c{font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
/* calendar */
.cal-wrap{max-width:720px;margin:0 auto}
.cal-day{margin-bottom:22px}
.cal-dh{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.cal-dn{width:40px;height:40px;background:var(--acc);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cal-dn .wd{font-size:8px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--bg0);opacity:.6}
.cal-dn .dd{font-family:var(--font-d);font-size:16px;font-weight:800;color:var(--bg0);line-height:1}
.cal-df{font-size:13px;font-weight:500;color:var(--t0)}
.cal-dc{font-size:11px;color:var(--t3);margin-top:1px}
.cal-items{display:flex;flex-direction:column;gap:5px;padding-left:51px}
.cal-item{background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;transition:.15s}
.cal-item:hover{border-color:var(--line2);box-shadow:0 2px 10px rgba(0,0,0,.22)}
.cal-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:30px}
.cal-info{flex:1;min-width:0}
.cal-r1{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.cal-tt{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;background:var(--bg3);color:var(--t3);padding:2px 5px;border-radius:3px}
.cal-sb{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px}
.cal-tm{margin-left:auto;font-size:10px;color:var(--t3)}
.cal-cap{font-size:12.5px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-cmt{font-size:10px;color:var(--t3);font-style:italic;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* drawer */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;animation:fi .18s ease}
#drawer{position:fixed;top:0;right:0;height:100vh;width:var(--drawer);background:var(--bg1);border-left:1px solid var(--line);z-index:201;display:flex;flex-direction:column;animation:si .22s cubic-bezier(.22,1,.36,1)}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{transform:translateX(100%)}to{transform:translateX(0)}}
.dr-head{flex-shrink:0;padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.dr-head-l{display:flex;align-items:center;gap:7px}
.dr-head-l h3{font-family:var(--font-d);font-size:13px;font-weight:600;color:var(--t0)}
.dr-head-l span{font-size:11px;color:var(--t3)}
.dr-body{flex:1;overflow-y:auto}
.dr-sec{padding:14px 16px;border-bottom:1px solid var(--line)}
.dr-sl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.dr-cap{font-size:13px;color:var(--t1);line-height:1.65}
.st-pills{display:flex;gap:5px;flex-wrap:wrap}
.st-pill{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1.5px solid transparent;cursor:pointer;font-family:var(--font);transition:.14s}
.st-pill.on{border-color:currentColor !important}
.cmts{padding:12px 16px;display:flex;flex-direction:column;gap:9px}
.cmt-b{display:flex;gap:7px}
.cmt-b.mine{flex-direction:row-reverse}
.cmt-av{width:24px;height:24px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--t1);flex-shrink:0;margin-top:2px;font-family:var(--font-d)}
.cmt-inner{max-width:82%}
.cmt-txt{display:inline-block;padding:7px 10px;border-radius:9px;font-size:12px;line-height:1.45;background:var(--bg3);color:var(--t1)}
.cmt-b:not(.mine) .cmt-txt{border-radius:2px 9px 9px 9px}
.cmt-b.mine .cmt-txt{background:var(--acc);color:var(--bg0);border-radius:9px 2px 9px 9px}
.cmt-meta{font-size:9px;color:var(--t3);margin-top:3px;padding:0 2px}
.no-cmts{text-align:center;padding:24px;font-size:12px;color:var(--t3);font-style:italic}
.dr-foot{flex-shrink:0;padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:7px;background:var(--bg1)}
.dr-foot input{flex:1;padding:8px 11px;border:1px solid var(--line2);border-radius:var(--r8);background:var(--bg2);color:var(--t0);font-family:var(--font);font-size:12.5px;outline:none;transition:.12s}
.dr-foot input:focus{border-color:var(--acc2)}
.dr-foot input::placeholder{color:var(--t3)}
/* modals */
#mwrap{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .15s ease}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r16);width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.modal-sm{max-width:380px}.modal-md{max-width:490px}.modal-lg{max-width:640px}
.mhead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.mhead h2{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--t0)}
.mbody{padding:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.mfoot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:7px;justify-content:flex-end;align-items:center}
.type-btns{display:flex;gap:5px}
.type-btn{flex:1;padding:8px;border-radius:var(--r8);border:1px solid var(--line2);background:var(--bg3);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;text-align:center;font-family:var(--font);transition:.12s}
.type-btn.on{background:var(--acc);color:var(--bg0);border-color:var(--acc);font-weight:600}
.sw-row{display:flex;gap:7px;flex-wrap:wrap}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;transition:.12s;flex-shrink:0}
.swatch:hover{transform:scale(1.15)}
.swatch.on{outline:2.5px solid var(--acc);outline-offset:2px}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.role-btn{padding:10px;border-radius:var(--r10);border:1px solid var(--line2);background:var(--bg3);cursor:pointer;text-align:left;font-family:var(--font);transition:.12s}
.role-btn.on{background:var(--acc);border-color:var(--acc)}
.role-btn.on .rl{color:var(--bg0)}.role-btn.on .rs{color:rgba(0,0,0,.5)}
.rl{font-size:13px;font-weight:600;color:var(--t0);display:block;margin-bottom:2px}
.rs{font-size:10px;color:var(--t3)}
.err{background:rgba(224,85,85,.12);border:1px solid rgba(224,85,85,.3);border-radius:var(--r8);padding:8px 11px;font-size:12px;color:var(--red);margin-bottom:12px}
.upload-z{border:2px dashed var(--line2);border-radius:var(--r8);padding:28px;text-align:center;cursor:pointer;transition:.12s;background:var(--bg3)}
.upload-z:hover{border-color:var(--acc2);background:var(--bg4)}
.img-prev{position:relative;border-radius:var(--r8);overflow:hidden}
.img-prev img{width:100%;object-fit:cover;border-radius:var(--r8);display:block;max-height:200px}
.img-rm{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.65);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.img-prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:var(--r8);overflow:hidden;position:relative}
.img-prev-grid img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.mem-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line)}
.mem-row:last-child{border-bottom:none}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:13px;font-weight:500;color:var(--t0)}
.mem-email{font-size:11px;color:var(--t3)}
.mem-rb{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--t2);text-transform:capitalize}
.utbl{width:100%;border-collapse:collapse}
.utbl th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
.utbl td{font-size:12px;color:var(--t1);padding:8px;border-bottom:1px solid var(--line)}
.utbl tr:last-child td{border-bottom:none}
.utbl tr:hover td{background:var(--bg3)}
/* login */
#login-screen{position:fixed;inset:0;background:var(--bg0);display:flex;align-items:center;justify-content:center;z-index:400;padding:16px}
.lg-bg::before{content:'';position:fixed;top:-20%;left:-10%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(232,213,163,.055) 0%,transparent 60%);pointer-events:none}
.lg-bg::after{content:'';position:fixed;bottom:-20%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(74,143,212,.04) 0%,transparent 60%);pointer-events:none}
.login-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r16);padding:32px 28px;width:100%;max-width:355px;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.login-mark{width:33px;height:33px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-mark svg{fill:var(--bg0)}
.login-wm{font-family:var(--font-d);font-size:19px;font-weight:800;color:var(--t0)}
.login-tag{font-size:12px;color:var(--t3);margin-bottom:24px}
.lf{margin-bottom:13px}
.lf label{display:block;font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.login-sw{font-size:12px;color:var(--t3);text-align:center;margin-top:13px}
.login-sw a{color:var(--acc);font-weight:500;cursor:pointer}
.demo-sec{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
.demo-lbl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:9px}
.demo-row{display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:var(--r8);cursor:pointer;transition:.12s}
.demo-row:hover{background:var(--bg3)}
.demo-name{font-size:12px;font-weight:500;color:var(--t0)}
.demo-role{font-size:10px;color:var(--t3)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;text-align:center}
.empty-ico{font-size:32px;opacity:.14;margin-bottom:12px}
.empty-ttl{font-family:var(--font-d);font-size:15px;font-weight:600;color:var(--t2);margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--t3)}
.hidden{display:none!important}
input[type=file].hf{display:none}
</style>
</head>
<body>
<div class="lg-bg"></div>

<!-- LOGIN -->
<div id="login-screen">

    <div class="login-logo">
      <div class="login-mark"><svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 1L1 6v9h5V10h4v5h5V6L8 1z"/></svg></div>

<!-- APP -->
<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sb-head">
      <div class="sb-mark"><svg width="13" height="13" viewBox="0 0 16 16"><path d="M8 1L1 6v9h5V10h4v5h5V6L8 1z"/></svg></div>
      <span class="sb-wm">Approvel</span>
    </div>
    <div class="sb-body">

        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
        Overview
      </a>
      <a class="nav hidden" id="nav-admin" onclick="go('admin')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M1 14c0-3 2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M13 8v4m-2-2h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Users & Access
      </a>
      <div class="sb-lbl" style="margin-top:6px">
        Projects
        <button class="sb-lbl-btn" id="btn-np" onclick="openModal_NewProject()" title="New project">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="sb-projs"></div>
    </div>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="av" id="sb-av"></div>

      </div>
      <button class="sb-out" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div><div class="tb-title" id="tb-title">Overview</div><div class="tb-sub" id="tb-sub"></div></div>
      <div class="tb-r" id="tb-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="ov" class="hidden" onclick="closeDrawer()"></div>
<div id="drawer" class="hidden"></div>
<div id="mwrap" class="hidden" onclick="closeMWrap(event)"><div id="mbox"></div></div>

<script>
'use strict';
const DB_KEY='approvel_v5';
const PCOLS=['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#0f766e','#c2410c'];
const STATUS={
  pending: {label:'Pending review',c:'#e05555',bg:'rgba(224,85,85,.16)',tc:'#f08080'},
  approved:{label:'Approved',      c:'#4caf72',bg:'rgba(76,175,114,.16)',tc:'#6fcf8a'},
  rejected:{label:'Rejected',      c:'#9a9790',bg:'rgba(154,151,144,.16)',tc:'#c8c4bc'},
  changes: {label:'Changes needed',c:'#d4882a',bg:'rgba(212,136,42,.16)', tc:'#e8a850'},
  new:     {label:'New post',      c:'#4a8fd4',bg:'rgba(74,143,212,.16)', tc:'#72aee8'},
};
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}

let DB=(()=>{try{const d=JSON.parse(localStorage.getItem(DB_KEY));if(d?.users)return d}catch{}return null})();
if(!DB){
  const[ow,m1,m2,c1,c2,c3]=[uid(),uid(),uid(),uid(),uid(),uid()];
  const[p1,p2,p3]=[uid(),uid(),uid()];
  const day=86400000,now=Date.now();
  function sc(d,h){const x=new Date(now+d*day);x.setHours(h,0,0,0);return x.getTime()}
  DB={
    users:[
      {id:ow,name:'RMS Owner',        email:'owner@rmsteam.com',   pw:'owner123',  role:'owner',   projs:[p1,p2,p3]},
      {id:m1,name:'Alex Kim',         email:'alex@rmsteam.com',    pw:'manager123',role:'manager', projs:[p1,p2,p3]},
      {id:m2,name:'Mia Chen',         email:'mia@rmsteam.com',     pw:'manager123',role:'manager', projs:[p1,p3]},
      {id:c1,name:'TechCorp Client',  email:'client@techcorp.com', pw:'client123', role:'client',  projs:[p1]},
      {id:c2,name:'FoodBrand Client', email:'client@foodbrand.com',pw:'client123', role:'client',  projs:[p2]},
      {id:c3,name:'LifeStyle Client', email:'client@lifestyle.com',pw:'client123', role:'client',  projs:[p3]},
    ],
    projects:[
      {id:p1,name:'TechCorp Q2 2026',  client:'TechCorp',    color:'#4f46e5'},
      {id:p2,name:'FoodBrand Summer',  client:'FoodBrand',   color:'#d97706'},
      {id:p3,name:'LifeStyle Rebrand', client:'LifeStyle Co',color:'#dc2626'},
    ],
    posts:[
      {id:uid(),pid:p1,type:'post', cap:'Introducing our AI-powered dashboard. Smarter insights, faster decisions. #TechCorp',img:null,imgs:null,at:sc(1,10),status:'approved'},
      {id:uid(),pid:p1,type:'story',cap:'Our platform processes 1.5M+ data points per second.',img:null,imgs:null,at:sc(1,12),status:'changes'},
      {id:uid(),pid:p1,type:'post', cap:'Meet the team behind the code. Passionate. Building tomorrow today. #Culture',img:null,imgs:null,at:sc(2,9),status:'pending'},
      {id:uid(),pid:p1,type:'post', cap:'Sustainability meets tech. New green data centers live. Zero carbon by 2027 🌱',img:null,imgs:null,at:sc(2,14),status:'new'},
      {id:uid(),pid:p1,type:'story',cap:'The future of work is async. Swipe up for our free report.',img:null,imgs:null,at:sc(3,11),status:'rejected'},
      {id:uid(),pid:p1,type:'reel', cap:'Behind the scenes: A day in the life at TechCorp HQ! 🎬',img:null,imgs:null,at:sc(3,10),status:'pending'},
      {id:uid(),pid:p2,type:'post', cap:'Summer flavors are HERE. New seasonal menu drops Friday 🍕',img:null,imgs:null,at:sc(1,12),status:'approved'},
      {id:uid(),pid:p2,type:'story',cap:'Behind the scenes: our chefs craft the perfect summer bite.',img:null,imgs:null,at:sc(1,18),status:'pending'},
      {id:uid(),pid:p2,type:'reel', cap:'Fresh ingredients, bold flavors. Every dish tells a story 🌿',img:null,imgs:null,at:sc(2,11),status:'new'},
      {id:uid(),pid:p3,type:'post', cap:'Rebrand reveal: New logo, same soul. What do you think? ✨',img:null,imgs:null,at:sc(1,11),status:'changes'},
      {id:uid(),pid:p3,type:'post', cap:'Bold. Fluid. Unmistakably you. The LifeStyle new collection 🌊',img:null,imgs:null,at:sc(2,10),status:'new'},
    ],
    comments:[],session:null,
  };
  const pids=DB.posts.map(p=>p.id);
  DB.comments=[
    {id:uid(),postId:pids[0],authorId:m1,body:'Looks great! Scheduling confirmed for Tuesday.',at:Date.now()-3600000},
    {id:uid(),postId:pids[1],authorId:c1,body:'Can we update the stat to 2M? Q1 numbers just in.',at:Date.now()-1800000},
    {id:uid(),postId:pids[1],authorId:m1,body:'Absolutely — will revise today.',at:Date.now()-900000},
    {id:uid(),postId:pids[9],authorId:c3,body:'Love the palette! Can the copy be more playful?',at:Date.now()-600000},
  ];
  save();
}
function save(){localStorage.setItem(DB_KEY,JSON.stringify(DB))}

// STATE
let CU=null,view='overview',projId=null,tab='feed',drawerPostId=null;
let newPostType='post',newPostImgs=[],newProjColor=PCOLS[0],signupRole='manager';
let _nuRole='manager';

// HELPERS
window.$=function(id){return document.getElementById(id)};
function ini(n){if(!n)return'?';return n.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function tEmoji(t){return{post:'🖼',story:'🎞',reel:'🎬'}[t]||'📄'}
function fmtD(ts){return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
function fmtT(ts){return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function fmtDF(ts){return new Date(ts).toLocaleDateString('en-GB',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function fmtDS(ts){return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function dKey(ts){const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime()}
function toDTL(ts){const d=new Date(ts),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uProjs(u){return DB.projects.filter(p=>u.projs.includes(p.id))}
function avSt(r){if(r==='owner')return'background:#2a1a0a;color:#c4a96b';if(r==='manager')return'background:#1a1a3a;color:#8080d4';return'background:#0a2a1a;color:#4caf72'}
function canEdit(){return CU&&(CU.role==='owner'||CU.role==='manager')}
function isOwner(){return CU?.role==='owner'}

// CANVAS
const PALS=[['#1a1060','#3d2a8a','#7c5cbf'],['#0a2a1a','#1a5c38','#3d9e6a'],['#2a1005','#7a3010','#c4682a'],['#08202e','#0f4a6e','#2a8abf'],['#1e0a28','#5c1a7a','#a04abf'],['#1a1a08','#4a4a10','#8a8a28'],['#280a0a','#7a1818','#c43838'],['#08282a','#107870','#28c4b8']];
function getPal(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return PALS[h%PALS.length]}
function drawThumb(cv,post){
  if(!cv)return;const sz=cv.width=cv.height=300;const ctx=cv.getContext('2d'),p=getPal(post.id);
  const bg=ctx.createLinearGradient(0,0,sz,sz);bg.addColorStop(0,p[0]);bg.addColorStop(.6,p[1]);bg.addColorStop(1,p[2]);
  ctx.fillStyle=bg;ctx.fillRect(0,0,sz,sz);
  ctx.save();ctx.globalAlpha=.1;
  for(let i=0;i<6;i++){const x=Math.sin(i*1.3)*sz*.4+sz*.5,y=Math.cos(i*1.1)*sz*.4+sz*.5,r=sz*(.14+i*.035);const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'rgba(255,255,255,.9)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
  ctx.restore();ctx.save();ctx.globalAlpha=.05;ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=.5;
  for(let i=0;i<sz;i+=20){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,sz);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(sz,i);ctx.stroke()}
  ctx.restore();ctx.save();ctx.globalAlpha=.15;ctx.strokeStyle=p[2];ctx.lineWidth=52;ctx.beginPath();ctx.moveTo(-sz*.1,sz*.9);ctx.lineTo(sz*.9,-sz*.1);ctx.stroke();ctx.restore();
  if(post.type==='reel'){ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,sz*.41,sz,sz*.18);ctx.globalAlpha=.28;ctx.fillStyle='rgba(255,255,255,.55)';for(let i=0;i<6;i++)ctx.fillRect(sz*.04+i*(sz*.16),sz*.43,sz*.1,sz*.13);ctx.restore()}
}

// AUTH
function boot(){
  renderDemoList();
  if(DB.session){CU=DB.users.find(u=>u.id===DB.session);if(CU){enterApp();return}}
  $('login-screen').classList.remove('hidden');
}
function renderDemoList(){
  $('demo-list').innerHTML=DB.users.map(u=>`<div class="demo-row" onclick="quickLogin('${u.id}')">
    <div class="av" style="${avSt(u.role)}">${ini(u.name)}</div>
    <div><div class="demo-name">${esc(u.name)}</div><div class="demo-role">${u.role} · ${uProjs(u).map(p=>esc(p.name)).join(', ')||'all'}</div></div>
  </div>`).join('');
}
function showForm(f){$('form-login').classList.toggle('hidden',f!=='login');$('form-signup').classList.toggle('hidden',f!=='signup');$('lerr').classList.add('hidden')}
function pickRole(r){signupRole=r;$('rb-manager').classList.toggle('on',r==='manager');$('rb-client').classList.toggle('on',r==='client')}
function showErr(m){$('lerr').textContent=m;$('lerr').classList.remove('hidden')}
function doLogin(){
  const em=$('l-em').value.trim().toLowerCase(),pw=$('l-pw').value;
  const u=DB.users.find(u=>u.email.toLowerCase()===em&&u.pw===pw);
  if(!u){showErr('Invalid email or password.');return}
  CU=u;DB.session=u.id;save();enterApp();
}
function doSignup(){
  const name=$('s-name').value.trim(),em=$('s-em').value.trim().toLowerCase(),pw=$('s-pw').value;
  if(!name||!em||!pw){showErr('Please fill all fields.');return}
  if(pw.length<8){showErr('Password must be at least 8 characters.');return}
  if(DB.users.find(u=>u.email.toLowerCase()===em)){showErr('Email already registered.');return}
  const u={id:uid(),name,email:em,pw,role:signupRole,projs:[]};
  DB.users.push(u);DB.session=u.id;CU=u;save();enterApp();
}
function quickLogin(id){CU=DB.users.find(u=>u.id===id);DB.session=id;save();enterApp()}
function logout(){DB.session=null;CU=null;save();closeDrawer();closeModal();$('app').classList.add('hidden');$('login-screen').classList.remove('hidden')}
function enterApp(){
  $('login-screen').classList.add('hidden');$('app').classList.remove('hidden');
  $('sb-av').textContent=ini(CU.name);$('sb-av').setAttribute('style',avSt(CU.role));
  $('sb-uname').textContent=CU.name;$('sb-urole').textContent=CU.role;
  $('btn-np').style.display=canEdit()?'':'none';
  $('nav-admin').classList.toggle('hidden',!isOwner());
  renderSidebar();go('overview');
}

// SIDEBAR
function renderSidebar(){
  const projs=isOwner()?DB.projects:uProjs(CU);
  if(!projs.length){$('sb-projs').innerHTML=`<p style="padding:5px 9px;font-size:11px;color:var(--t3)">${canEdit()?'Click + to create a project':'No projects assigned yet'}</p>`;return}
  $('sb-projs').innerHTML=projs.map(p=>{
    const cnt=DB.posts.filter(x=>x.pid===p.id&&(x.status==='pending'||x.status==='new')).length;
    return`<a class="nav" id="nav-p-${p.id}" onclick="go('project','${p.id}')">
      <span class="nav-dot" style="background:${p.color}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
      ${cnt?`<span class="nav-badge">${cnt}</span>`:''}
    </a>`;
  }).join('');
}
function setActive(){
  document.querySelectorAll('.nav').forEach(e=>e.classList.remove('on'));
  if(view==='overview')$('nav-overview')?.classList.add('on');
  else if(view==='admin')$('nav-admin')?.classList.add('on');
  else if(view==='project')$(`nav-p-${projId}`)?.classList.add('on');
}

// ROUTING
function go(v,pid=null){view=v;if(pid)projId=pid;closeDrawer();setActive();renderTopbar();renderContent()}
function switchTab(t){tab=t;renderTopbar();renderContent()}

// TOPBAR
function renderTopbar(){
  const tt=$('tb-title'),ts=$('tb-sub'),ta=$('tb-actions');
  if(view==='overview'){tt.textContent='Overview';ts.textContent='';ta.innerHTML='';return}
  if(view==='admin'){tt.textContent='Users & Access';ts.textContent='Platform administration';ta.innerHTML=`<button class="btn btn-gold btn-sm" onclick="openModal_NewUser()">+ Add user</button>`;return}
  const p=DB.projects.find(x=>x.id===projId);
  tt.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block"></span>${esc(p.name)}`;
  ts.textContent=p.client;
  ta.innerHTML=`
    <div class="tabs"><button class="tab ${tab==='feed'?'on':''}" onclick="switchTab('feed')">Feed</button><button class="tab ${tab==='calendar'?'on':''}" onclick="switchTab('calendar')">Calendar</button></div>
    <button class="btn btn-outline btn-sm" onclick="exportPDF('${projId}')">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M4 10l4 4 4-4M8 14V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>PDF Plan
    </button>
    ${canEdit()?`<button class="btn btn-outline btn-sm" onclick="openModal_Members('${projId}')">Members</button>
    <button class="btn btn-gold btn-sm" onclick="openModal_NewPost('${projId}')">+ Add post</button>`:''}`;
}

// CONTENT
function renderContent(){
  if(view==='overview'){$('content').innerHTML=renderOverview();return}
  if(view==='admin'){$('content').innerHTML=renderAdmin();return}
  $('content').innerHTML=tab==='feed'?renderFeed():renderCalendar();
}

// OVERVIEW — owner sees ALL projects
function renderOverview(){
  const projs=isOwner()?DB.projects:uProjs(CU);
  const all=DB.posts.filter(p=>projs.some(x=>x.id===p.pid));
  const pending=all.filter(p=>p.status==='pending'||p.status==='new').length;
  const approved=all.filter(p=>p.status==='approved').length;
  const changes=all.filter(p=>p.status==='changes').length;
  return`<div style="max-width:900px;margin:0 auto">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-lbl">Total posts</div><div class="stat-val">${all.length}</div></div>
      <div class="stat-card ca"><div class="stat-lbl">Awaiting review</div><div class="stat-val">${pending}</div></div>

// CALENDAR
function renderCalendar(){
  const posts=DB.posts.filter(p=>p.pid===projId).sort((a,b)=>a.at-b.at);
  if(!posts.length)return`<div class="empty"><div class="empty-ico">📅</div><div class="empty-ttl">No posts scheduled</div><div class="empty-sub">Add the first post above</div></div>`;
  const groups={};posts.forEach(p=>{const k=dKey(p.at);if(!groups[k])groups[k]=[];groups[k].push(p)});
  return`<div class="cal-wrap">${Object.keys(groups).sort().map(k=>{
    const items=groups[k],ts=parseInt(k),d=new Date(ts);
    return`<div class="cal-day">
      <div class="cal-dh">
        <div class="cal-dn"><span class="wd">${d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()}</span><span class="dd">${d.getDate()}</span></div>
        <div><div class="cal-df">${fmtDF(ts)}</div><div class="cal-dc">${items.length} item${items.length!==1?'s':''}</div></div>
      </div>
      <div class="cal-items">${items.map(post=>{
        const s=STATUS[post.status];
        const cmts=DB.comments.filter(c=>c.postId===post.id);
        const last=cmts[cmts.length-1],la=last?DB.users.find(u=>u.id===last.authorId):null;
        return`<div class="cal-item" onclick="openDrawer('${post.id}')">
          <div class="cal-bar" style="background:${s.c}"></div>
          <div class="cal-info">
            <div class="cal-r1"><span class="cal-tt">${post.type}</span><span class="cal-sb" style="background:${s.bg};color:${s.tc}">${s.label}</span><span class="cal-tm">${fmtT(post.at)}</span></div>
            <div class="cal-cap">${post.cap?esc(post.cap):'<em style="color:var(--t3)">No caption</em>'}</div>

}

// DRAWER
function openDrawer(id){drawerPostId=id;renderDrawer();$('ov').classList.remove('hidden');$('drawer').classList.remove('hidden')}
function closeDrawer(){drawerPostId=null;$('ov').classList.add('hidden');$('drawer').classList.add('hidden')}
function renderDrawer(){
  const post=DB.posts.find(p=>p.id===drawerPostId);if(!post)return;
  const s=STATUS[post.status];
  const cmts=DB.comments.filter(c=>c.postId===post.id).sort((a,b)=>a.at-b.at);
  const pillsHtml=Object.entries(STATUS).map(([k,v])=>{
    if(CU.role==='client'&&(k==='new'||k==='rejected'))return'';
    const on=post.status===k;
    return`<button class="st-pill ${on?'on':''}" style="background:${v.bg};color:${v.tc};${on?'border-color:'+v.c:''}" onclick="setStatus('${post.id}','${k}')">${v.label}</button>`;
  }).join('');
  const cmtsHtml=!cmts.length?`<div class="no-cmts">No comments yet.</div>`:cmts.map(c=>{
    const a=DB.users.find(u=>u.id===c.authorId),mine=c.authorId===CU.id;
    return`<div class="cmt-b ${mine?'mine':''}">
      <div class="cmt-av" style="${avSt(a?.role||'client')}">${ini(a?.name||'?')}</div>
      <div class="cmt-inner"><div class="cmt-txt">${esc(c.body)}</div><div class="cmt-meta">${esc(a?.name?.split(' ')[0]||'?')} · ${fmtT(c.at)}</div></div>
    </div>`;
  }).join('');
  let thumbHtml;
  if(post.imgs&&post.imgs.length>1){
    thumbHtml=`<div style="display:grid;grid-template-columns:repeat(${Math.min(post.imgs.length,3)},1fr);gap:2px">${post.imgs.map(src=>`<img src="${src}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block"/>`).join('')}</div>`;
  }else if(post.img){
    thumbHtml=`<img src="${post.img}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block"/>`;
  }else{
    thumbHtml=`<div style="width:100%;aspect-ratio:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg3)">
      <canvas id="dr-cv" width="420" height="420" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
      <div style="position:relative;z-index:1;text-align:center"><div style="font-size:46px;line-height:1">${tEmoji(post.type)}</div><div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:8px;text-transform:uppercase;letter-spacing:.5px">${post.type} · no image</div></div>
    </div>`;
  }
  $('drawer').innerHTML=`
    <div class="dr-head">
      <div class="dr-head-l"><h3 style="text-transform:capitalize">${post.type}</h3><span>·</span><span>${fmtD(post.at)}</span></div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeDrawer()"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    </div>
    <div class="dr-body">
      ${thumbHtml}
      <div class="dr-sec"><div class="dr-sl">Caption</div><div class="dr-cap">${post.cap?esc(post.cap):'<em style="color:var(--t3)">No caption added</em>'}</div></div>
      <div class="dr-sec"><div class="dr-sl">Status</div><div class="st-pills">${pillsHtml}</div></div>
      <div class="dr-sec" style="border-bottom:none"><div class="dr-sl">Comments ${cmts.length?`(${cmts.length})`:''}</div></div>
      <div class="cmts" id="cmts-list">${cmtsHtml}</div>
      <div style="height:6px"></div>
    </div>
    <div class="dr-foot">
      <input id="cmt-inp" type="text" placeholder="Leave a comment…" onkeydown="if(event.key==='Enter')submitComment()"/>
      <button class="btn btn-gold btn-sm btn-icon" onclick="submitComment()"><svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M1 6.5h11M7.5 2l4.5 4.5L7.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>`;
  if(!post.img&&(!post.imgs||!post.imgs.length))setTimeout(()=>{const cv=$('dr-cv');if(cv)drawThumb(cv,post)},0);
}
function setStatus(postId,status){const p=DB.posts.find(x=>x.id===postId);if(p){p.status=status;save()}renderDrawer();renderContent();renderSidebar()}
function submitComment(){
  const inp=$('cmt-inp'),body=inp?.value?.trim();if(!body)return;
  DB.comments.push({id:uid(),postId:drawerPostId,authorId:CU.id,body,at:Date.now()});
  save();inp.value='';renderDrawer();renderContent();
  setTimeout(()=>{const l=$('cmts-list');if(l)l.scrollTop=l.scrollHeight},50);
}

function triggerFileInput(){var el=document.getElementById('file-inp');if(el)el.click()}
function pickPT(t){newPostType=t;['post','story','reel'].forEach(x=>{var el=document.getElementById('tb-'+x);if(el)el.classList.toggle('on',x===t)})}
function handleDrop(e){e.preventDefault();loadFiles([...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')))}
function handleFiles(e){loadFiles([...e.target.files])}
function loadFiles(files){
  if(!files.length)return;
  newPostImgs=[];let done=0;
  const toLoad=files.slice(0,10);
  toLoad.forEach((f,i)=>{
    const r=new FileReader();
    r.onload=ev=>{newPostImgs[i]=ev.target.result;done++;if(done===toLoad.length)renderUploadPrev()};
    r.readAsDataURL(f);
  });
}
function renderUploadPrev(){
  const area=$('upload-area');if(!area||!newPostImgs.length)return;
  if(newPostImgs.length===1){
    area.innerHTML=`<div class="img-prev"><img src="${newPostImgs[0]}"/><button class="img-rm" onclick="clearImgs()">✕</button></div>`;
  }else{
    area.innerHTML=`<div class="img-prev-grid">${newPostImgs.map(s=>`<img src="${s}"/>`).join('')}<button class="img-rm" onclick="clearImgs()" style="top:6px;right:6px">✕</button></div>
      <div style="font-size:10px;color:var(--t3);margin-top:5px">${newPostImgs.length} images · first used as feed thumbnail</div>`;
  }
}
function clearImgs(){
  newPostImgs=[];
  $('upload-area').innerHTML=`<div class="upload-z" onclick="triggerFileInput()" style="padding:26px" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
    <div style="font-size:26px;opacity:.2;margin-bottom:7px">🖼</div>
    <div style="font-size:13px;color:var(--t2)">Click to upload or drag & drop</div>
    <div style="font-size:10px;color:var(--t3);margin-top:3px">JPG · PNG · GIF · WEBP</div>
  </div><input class="hf" type="file" id="file-inp" accept="image/*" multiple onchange="handleFiles(event)"/>`;
}
function createPost(pid){
  var capEl=document.getElementById('np-cap'),dtEl=document.getElementById('np-dt'),stEl=document.getElementById('np-st');
  var cap=capEl?capEl.value.trim():'',dt=dtEl?dtEl.value:'',status=stEl?stEl.value:'new';
  if(!dt){alert('Please set a scheduled date and time');return}
  DB.posts.push({id:uid(),pid,type:newPostType,cap:cap||null,img:newPostImgs[0]||null,imgs:newPostImgs.length>1?[...newPostImgs]:null,at:new Date(dt).getTime(),status});
  save();closeModal();renderContent();renderSidebar();
}

      <div class="field"><label>Password</label><input class="inp" id="nu-pw" type="text" placeholder="Min. 8 characters"/></div>
      <div class="field"><label>Role</label>
        <div class="role-row">
          <div class="role-btn on" id="nur-manager" onclick="pickNUR('manager')"><span class="rl">🏢 Manager</span><span class="rs">RMS team member</span></div>
          <div class="role-btn" id="nur-client" onclick="pickNUR('client')"><span class="rl">👤 Client</span><span class="rs">Client reviewer</span></div>
        </div>
      </div>
      <div class="field"><label>Assign projects</label>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${DB.projects.map(p=>`<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--t1)">
            <input type="checkbox" id="pc-${p.id}" style="accent-color:var(--acc2)"/>
            <span class="nav-dot" style="background:${p.color}"></span>${esc(p.name)}
          </label>`).join('')}
        </div>
      </div>
    </div>
    <div class="mfoot"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="createUser()">Create user</button></div>`,'modal-md');
}
function pickNUR(r){_nuRole=r;$('nur-manager').classList.toggle('on',r==='manager');$('nur-client').classList.toggle('on',r==='client')}
function createUser(){
  const name=$('nu-name').value.trim(),em=$('nu-em').value.trim().toLowerCase(),pw=$('nu-pw').value;
  if(!name||!em||!pw){alert('Please fill all fields');return}
  if(pw.length<8){alert('Password must be at least 8 characters');return}
  if(DB.users.find(u=>u.email.toLowerCase()===em)){alert('Email already registered');return}
  const projs=DB.projects.filter(p=>$(`pc-${p.id}`)?.checked).map(p=>p.id);
  const u={id:uid(),name,email:em,pw,role:_nuRole,projs};
  DB.users.push(u);save();closeModal();renderContent();renderDemoList();
  alert(`✅ User created!\nEmail: ${em}\nPassword: ${pw}\n\nShare these credentials with the user.`);
}

// EDIT USER (owner)
function openModal_EditUser(userId){
  if(!isOwner())return;
  const u=DB.users.find(x=>x.id===userId);if(!u)return;
  showModal(`<div class="mhead"><h2>Edit — ${esc(u.name)}</h2>${xBtn()}</div>
    <div class="mbody">
      <div class="field"><label>Full name</label><input class="inp" id="eu-name" value="${esc(u.name)}"/></div>
      <div class="field"><label>Email</label><input class="inp" id="eu-em" type="email" value="${esc(u.email)}"/></div>
      <div class="field"><label>New password <span style="color:var(--t3);font-weight:400;text-transform:none;font-size:10px">leave blank to keep current</span></label><input class="inp" id="eu-pw" type="text" placeholder="New password…"/></div>
      <div class="field"><label>Role</label>
        <select class="inp" id="eu-role">
          <option value="owner" ${u.role==='owner'?'selected':''}>Owner</option>
          <option value="manager" ${u.role==='manager'?'selected':''}>Manager</option>
          <option value="client" ${u.role==='client'?'selected':''}>Client</option>
        </select>
      </div>
      <div class="field"><label>Projects</label>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${DB.projects.map(p=>`<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--t1)">
            <input type="checkbox" id="epc-${p.id}" ${u.projs.includes(p.id)?'checked':''} style="accent-color:var(--acc2)"/>
            <span class="nav-dot" style="background:${p.color}"></span>${esc(p.name)}
          </label>`).join('')}
        </div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Delete</button>
      <div style="flex:1"></div>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveUser('${u.id}')">Save</button>
    </div>`,'modal-md');
}
function saveUser(userId){
  const u=DB.users.find(x=>x.id===userId);if(!u)return;
  u.name=$('eu-name').value.trim()||u.name;
  u.email=$('eu-em').value.trim().toLowerCase()||u.email;
  const np=$('eu-pw').value;if(np&&np.length>=8)u.pw=np;
  u.role=$('eu-role').value;
  u.projs=DB.projects.filter(p=>$(`epc-${p.id}`)?.checked).map(p=>p.id);
  save();closeModal();renderContent();renderSidebar();renderDemoList();
}
function deleteUser(userId){
  if(!confirm('Delete this user? This cannot be undone.'))return;
  DB.users=DB.users.filter(u=>u.id!==userId);
  if(DB.session===userId){DB.session=null;save();logout();return}
  save();closeModal();renderContent();renderDemoList();
}

// PDF EXPORT — RMS template style
function exportPDF(pid){
  const proj=DB.projects.find(p=>p.id===pid);
  const posts=DB.posts.filter(p=>p.pid===pid).sort((a,b)=>a.at-b.at);
  if(!posts.length){alert('No posts to export.');return}
  const fd=new Date(posts[0].at);
  const year=fd.getFullYear(),month=fd.getMonth();
  const monthLabel=fd.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const daysInMonth=new Date(year,month+1,0).getDate();
  const byDay={};posts.forEach(p=>{const d=new Date(p.at).getDate();if(!byDay[d])byDay[d]=[];byDay[d].push(p)});
  let firstDow=(new Date(year,month,1).getDay()+6)%7;
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const rows=weeks.map(w=>`<tr>${w.map(d=>{
    if(!d)return`<td style="border:1px solid #e0ddd8;padding:8px;min-height:72px;vertical-align:top;background:#faf9f7"></td>`;
    const dp=byDay[d]||[];
    return`<td style="border:1px solid #e0ddd8;padding:8px;min-height:72px;vertical-align:top">
      <div style="font-weight:600;font-size:12px;color:#333;margin-bottom:4px">${d}</div>
      ${dp.map(p=>`<div style="font-size:10px;color:#555;margin-bottom:2px;line-height:1.35;background:#f0edf8;padding:2px 5px;border-radius:3px;border-left:2px solid #6b5b9e">${p.cap?p.cap.split(' ').slice(0,5).join(' ')+'…':tEmoji(p.type)}<span style="color:#9b8bbf;margin-left:3px">${p.type}</span></div>`).join('')}
    </td>`;
  }).join('')}</tr>`).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}@media print{@page{size:A4 landscape;margin:0}.noprint{display:none}.page{page-break-after:always}}</style>
</head><body>
<div class="page" style="width:297mm;height:210mm;background:#6b5b9e;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative">
  <div style="color:#fff;font-size:90px;font-weight:900;letter-spacing:-3px;line-height:.8;margin-bottom:14px;font-style:italic;opacity:.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">RMS</div>
  <div style="position:relative;z-index:1">
    <div style="color:#fff;font-size:72px;font-weight:900;letter-spacing:-2px;line-height:.85;margin-bottom:10px">RMS</div>
    <div style="color:rgba(255,255,255,.65);font-size:11px;letter-spacing:5px;text-transform:uppercase;margin-bottom:40px">REAL MARKETING SOLUTIONS</div>
    <div style="color:#fff;font-size:32px;font-weight:700;margin-bottom:8px">${esc(proj.name)}</div>
    <div style="color:rgba(255,255,255,.75);font-size:18px">Posting Plan · ${monthLabel}</div>
  </div>
</div>
<div class="page" style="width:297mm;padding:14mm 12mm 10mm">
  <h2 style="text-align:center;font-size:16px;font-weight:600;color:#333;margin-bottom:16px">${esc(proj.name)} — ${monthLabel} · Feed Calendar</h2>
  <table style="width:100%;border-collapse:collapse;table-layout:fixed">
    <thead><tr>${days.map(d=>`<th style="background:#6b5b9e;color:#fff;padding:8px 6px;font-size:11px;font-weight:600;text-align:center;border:1px solid #5a4a8d">${d}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="position:fixed;bottom:10mm;right:12mm;opacity:.4;font-size:16px;font-weight:900;color:#6b5b9e;letter-spacing:-1px">RMS</div>
</div>
<div class="noprint" style="text-align:center;padding:24px;background:#f5f5f5;border-top:1px solid #ddd">
  <p style="font-size:13px;color:#666;margin-bottom:14px">Preview ready — click Print to save as PDF</p>
  <button onclick="window.print()" style="padding:10px 28px;background:#6b5b9e;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:8px">🖨 Print / Save as PDF</button>
  <button onclick="window.close()" style="padding:10px 20px;background:#eee;color:#555;border:none;border-radius:8px;font-size:14px;cursor:pointer">Close</button>
</div>
</body></html>`;
  const win=window.open('','_blank','width=1100,height=750');
  if(win){win.document.write(html);win.document.close()}
  else alert('Please allow popups for this site to open the PDF export.');
}

boot();
</script>
